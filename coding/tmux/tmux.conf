# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'


# Cores da barra de status
set -g status-style bg=default,fg=#ffffff

# Bordas das janelas (estilo minimalista)
set -g pane-border-style fg=#333333
set -g pane-active-border-style fg=#ffffff

# Mensagens de comando
set -g message-style bg=#ffffff,fg=#101010

# Configuração da Barra de Status
set -g status-left "#[fg=#101010,bg=#ffffff,bold] #S #[default] "
set -g status-right "#[fg=#ffffff,bg=#333333] %H:%M #[default]"

# Janelas (Ativa e Inativa)
setw -g window-status-current-format "#[fg=#ffffff,bold] #I:#W* "
setw -g window-status-format "#[fg=#777777] #I:#W  "

# Better splits
unbind '"'
unbind %

bind | split-window -h
bind - split-window -v

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

# Mouse
set -g mouse on
