# Sombras desabilitadas completamente (resolve 90% dos casos)
shadow = false;

# Sem transparência (tudo opaco)
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

# Fading desabilitado (evita artefatos em pop-ups)
fading = false;

# VSync ligado (evita tearing)
vsync = true;

# Backend
backend = "glx";

# Exclusões gerais para todos os tipos de janela problemática
shadow-exclude = [
    "window_type = 'popup_menu'",
    "window_type = 'dropdown_menu'",
    "window_type = 'tooltip'",
    "window_type = 'combo'",
    "window_type = 'dnd'",
    "window_type = 'utility'"
];

detect-client-opacity = false;
detect-transient = true;
detect-rounded-corners = true;
